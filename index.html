      .ur-text, p, li, span, h1, h2, h3, h4, h5, h6 { line-height: 2.4 !important; word-spacing: 0.15rem !important; }
      input, textarea, button, select { font-family: inherit !important; line-height: 2.5 !important; word-spacing: 0.1rem !important; font-size: 1.1rem !important; }

      @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-up { animation: fadeInUp 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
      .animate-fade-in { animation: fadeInUp 0.5s ease-out forwards; }
      
      @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
      .animate-bounce-slow { animation: bounce-slow 3s ease-in-out infinite; }

      .glass-panel { background: rgba(255, 255, 255, 0.90); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.8); }
      
      @keyframes pulse-emerald { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
      .pulse-next { animation: pulse-emerald 2s infinite; }

      @media print {
        body, html { height: auto !important; overflow: visible !important; background: white !important; }
        body * { visibility: hidden; }
        .print-me, .print-me * { visibility: visible !important; }
        .print-me { position: absolute !important; left: 0 !important; top: 0 !important; width: 100% !important; margin: 0 !important; padding: 0 !important; background: white !important; color: black !important; z-index: 99999; }
        .no-print { display: none !important; }
